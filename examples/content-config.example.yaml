# Content Configuration
#
# This file controls CONTENT GUIDANCE: how to use tools, narrative strategy,
# and context assembly for LLM prompts.
#
# For INFRASTRUCTURE settings (which platforms/models are enabled, scheduling,
# posting cadence, account tiers), see config.yaml.
#
# Place a customized version as `.social-hook/content-config.yaml` in your project.

